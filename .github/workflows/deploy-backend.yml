name: Build and Deploy Backend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to ACR
        uses: docker/login-action@v2
        with:
          registry: aeroagentregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: aeroagentregistry.azurecr.io/aeroagent-api:latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name aeroagent-api \
            --resource-group aeroagent-rg \
            --image aeroagentregistry.azurecr.io/aeroagent-api:latest \
            --set-env-vars \
              AZURE_AI_FOUNDRY_ENDPOINT="https://vihaa-mps8xsx2-eastus2.openai.azure.com" \
              AZURE_OPENAI_DEPLOYMENT="gpt-4o" \
              AZURE_EMBED_DEPLOYMENT="text-embedding-3-large" \
              AZURE_SEARCH_ENDPOINT="https://aeroagent-search.search.windows.net" \
              AZURE_SEARCH_ADMIN_KEY="${{ secrets.AZURE_SEARCH_ADMIN_KEY }}" \
              AZURE_KEYVAULT_URL="https://aeroagent-kv.vault.azure.net/" \
              DEMO_MODE="true" \
              AZURE_OPENAI_KEY="${{ secrets.AZURE_OPENAI_KEY }}"